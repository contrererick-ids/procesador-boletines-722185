name: CI/CD Pipeline (Python)

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.version.outputs.version_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set version tag
        id: version
        run: |
          VERSION_TAG="v1.${{ github.run_number }}"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8 (permisivo)
        run: |
          pip install flake8
          flake8 . --max-line-length=120

      - name: Validate syntax
        run: |
          python -m compileall .

  docker:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      docker_image: ${{ steps.set_image.outputs.docker_image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Docker image name
        id: set_image
        run: |
          IMAGE="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ needs.build.outputs.version_tag }}"
          echo "docker_image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -t ${{ steps.set_image.outputs.docker_image }} .
          docker push ${{ steps.set_image.outputs.docker_image }}
          docker tag ${{ steps.set_image.outputs.docker_image }} ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Set up SSH key
        run: |
          echo "${{ secrets.EC2_KEY }}" > /tmp/ssh_key.pem
          chmod 600 /tmp/ssh_key.pem

      - name: Deploy to EC2
        run: |
          DOCKER_IMAGE="${{ needs.docker.outputs.docker_image }}"

          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST_DEV }} << EOF

            echo "Writing .env file..."

            cat > .env <<EOL
              DOCKER_IMAGE=$DOCKER_IMAGE
              AWS_REGION=${{ secrets.AWS_DEFAULT_REGION }}
              AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
              AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
              AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }}

              DB_ENDPOINT=${{ secrets.DB_ENDPOINT }}
              DB_PORT=${{ secrets.DB_PORT }}
              DB_NAME=${{ secrets.DB_NAME }}
              DB_USER=${{ secrets.DB_USER }}
              DB_PASSWORD=${{ secrets.DB_PASSWORD }}

              SNS_TOPIC_ARN=${{ secrets.SNS_TOPIC_ARN }}

              EOL

                          echo "Login to ECR..."
                          aws ecr get-login-password --region ${{ secrets.AWS_DEFAULT_REGION }} \
                            | docker login --username AWS --password-stdin \
                            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com

                          echo "Pull latest image..."
                          docker compose pull

                          echo "Stopping containers..."
                          docker compose down

                          echo "Starting containers..."
                          docker compose up -d

                        EOF